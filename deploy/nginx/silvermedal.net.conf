# ============================================================================
# silvermedal.net — portal/entryway routing
# ----------------------------------------------------------------------------
# silvermedal.net is now served ENTIRELY by the main Red Rock codecamp app.
# The standalone silvermedal.net Express server (formerly port 5000) is
# retired: its salvaged static assets now live in the codecamp repo at
# public-silvermedal/ and are served by server/boot/a-silvermedal-static.js
# (scoped to this host). So nginx just needs a single upstream.
#
#   codecamp app (LoopBack/Express)  ->  127.0.0.1:3030
#
# What the codecamp app does for this host (Host: silvermedal.net):
#   - "/"                  -> branded Silver Medal landing (Jade)
#   - /about.html, /donate.html, /health.html, /styles.css, /images/silvermedal/...
#                          -> static, from public-silvermedal/
#   - /signin, /challenges, /auth, /api/workshops, ...
#                          -> the academy itself, with Silver Medal branding
# ============================================================================

upstream codecamp_app { server 127.0.0.1:3030; keepalive 16; }

# --- HTTP -> HTTPS redirect ------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name silvermedal.net www.silvermedal.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name silvermedal.net www.silvermedal.net;

    # ssl_certificate     /etc/letsencrypt/live/silvermedal.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/silvermedal.net/privkey.pem;

    client_max_body_size 25m;

    location / {
        # Pass the real Host so the codecamp domain-branding middleware picks
        # the silvermedal.net branding config.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://codecamp_app;
    }
}

